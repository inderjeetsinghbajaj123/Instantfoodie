name: Instantfoodie Full Stack CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install server dependencies
      working-directory: ./server
      run: npm ci

    - name: Check backend syntax
      working-directory: ./server
      env:
        JWT_SECRET: ci_test_secret_key_12345
        NODE_ENV: test
      run: |
        node --check src/app.js
        node --check index.js


  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install client dependencies
      working-directory: ./client
      run: npm ci

    - name: Build frontend
      working-directory: ./client
      env:
        VITE_API_URL: http://localhost:3000
      run: npm run build